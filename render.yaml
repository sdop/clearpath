services:
  - type: web
    name: clearpath
    runtime: node
    plan: free
    buildCommand: npm install && npx drizzle-kit push && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: /data/clearpath.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
